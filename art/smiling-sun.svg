<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Asphalt Trail — "smiling cartoon sun" logo.

  The mascot of the insurer's form letter that rules the family's Cape Coral home
  "uninsurable at any premium" (see GameIntro.cs). The joke is the cheerful face on
  the worst news of your life, so the sun is drawn deliberately friendly and corporate:
  a round Florida-tourism sun, beaming, utterly unbothered.

  Master reference for the ASCII conversion. viewBox is square so rays stay radial.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- One ray, apex pointing up, base sitting just outside the face circle. -->
    <polygon id="ray" points="100,4 91,52 109,52" fill="#F6A623"/>
  </defs>

  <!-- Twelve rays at 30 deg intervals, drawn behind the face. -->
  <g>
    <use href="#ray" transform="rotate(0 100 100)"/>
    <use href="#ray" transform="rotate(30 100 100)"/>
    <use href="#ray" transform="rotate(60 100 100)"/>
    <use href="#ray" transform="rotate(90 100 100)"/>
    <use href="#ray" transform="rotate(120 100 100)"/>
    <use href="#ray" transform="rotate(150 100 100)"/>
    <use href="#ray" transform="rotate(180 100 100)"/>
    <use href="#ray" transform="rotate(210 100 100)"/>
    <use href="#ray" transform="rotate(240 100 100)"/>
    <use href="#ray" transform="rotate(270 100 100)"/>
    <use href="#ray" transform="rotate(300 100 100)"/>
    <use href="#ray" transform="rotate(330 100 100)"/>
  </g>

  <!-- Face disc. -->
  <circle cx="100" cy="100" r="52" fill="#FFD23F" stroke="#E58E26" stroke-width="3"/>

  <!-- Eyes. -->
  <circle cx="82" cy="92" r="6.5" fill="#5A3A12"/>
  <circle cx="118" cy="92" r="6.5" fill="#5A3A12"/>

  <!-- Rosy tourism-brochure cheeks. -->
  <circle cx="74" cy="112" r="7" fill="#F4A0A0" opacity="0.8"/>
  <circle cx="126" cy="112" r="7" fill="#F4A0A0" opacity="0.8"/>

  <!-- Big untroubled smile. -->
  <path d="M 76 110 Q 100 138 124 110" fill="none" stroke="#5A3A12"
        stroke-width="5" stroke-linecap="round"/>
</svg>
